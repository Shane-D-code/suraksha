<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhishGuard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="popup-header">
      <div class="header-left">
        <span class="logo-icon">🛡️</span>
        <span class="logo-text">PhishGuard</span>
      </div>
      <button class="settings-btn" id="settings-btn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"></path>
        </svg>
      </button>
    </header>

    <!-- Scanning State -->
    <div id="scanning-view" class="view">
      <div class="scan-animation">
        <div class="scan-ring"></div>
        <div class="scan-icon">🔍</div>
      </div>
      <p class="scan-text">Analyzing page...</p>
      <p class="scan-subtext" id="scanning-url">-</p>
    </div>

    <!-- Result View -->
    <div id="result-view" class="view hidden">
      <!-- Status Badge -->
      <div class="status-card" id="status-card">
        <div class="status-icon" id="status-icon">✓</div>
        <div class="status-info">
          <span class="status-label" id="status-label">SAFE</span>
          <span class="status-confidence" id="status-confidence">98% confidence</span>
        </div>
      </div>

      <!-- URL Bar -->
      <div class="url-bar">
        <span class="url-favicon" id="url-favicon">🌐</span>
        <span class="url-text" id="url-text">-</span>
        <a class="url-external" href="#" target="_blank" title="Open in new tab">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
            <polyline points="15 3 21 3 21 9"></polyline>
            <line x1="10" y1="14" x2="21" y2="3"></line>
          </svg>
        </a>
      </div>

      <!-- Risk Score Bar -->
      <div class="score-section">
        <div class="score-header">
          <span class="score-label">Risk Score</span>
          <span class="score-value" id="score-value">0%</span>
        </div>
        <div class="score-bar">
          <div class="score-fill" id="score-fill"></div>
        </div>
      </div>

      <!-- Metrics Grid -->
      <div class="metrics-grid">
        <div class="metric-card">
          <span class="metric-label">ML Score</span>
          <span class="metric-value" id="ml-score">-</span>
        </div>
        <div class="metric-card">
          <span class="metric-label">Graph</span>
          <span class="metric-value" id="graph-score">-</span>
        </div>
        <div class="metric-card">
          <span class="metric-label">SSL</span>
          <span class="metric-value" id="ssl-status">-</span>
        </div>
        <div class="metric-card">
          <span class="metric-label">Age</span>
          <span class="metric-value" id="domain-age">-</span>
        </div>
      </div>

      <!-- Reasons -->
      <div class="reasons-section" id="reasons-section">
        <span class="reasons-title">Why?</span>
        <ul class="reasons-list" id="reasons-list"></ul>
      </div>
    </div>

    <!-- Error View -->
    <div id="error-view" class="view hidden">
      <div class="error-card">
        <span class="error-icon">⚠️</span>
        <p class="error-text" id="error-text">Unable to connect</p>
        <p class="error-subtext">Check if backend is running</p>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions-bar">
      <button class="action-btn primary" id="rescan-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"></polyline>
          <polyline points="1 20 1 14 7 14"></polyline>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
        </svg>
        Rescan
      </button>
      <button class="action-btn secondary" id="details-btn">
        Details
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </button>
    </div>

    <!-- Footer -->
    <footer class="popup-footer">
      <span class="footer-brand">PhishGuard</span>
      <span class="footer-version">v1.0</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
